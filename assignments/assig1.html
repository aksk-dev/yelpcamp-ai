<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
        }
        .sidebar a {
            color: #c2c7d0;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
        }
        .sidebar a:hover {
            color: #fff;
            background-color: #495057;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse" id="sidebarMenu">
            <div class="pt-4">
                <h5 class="text-white px-3 mb-4">Admin Panel</h5>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="#">Dashboard</a></li>
                    <li class="nav-item"><a href="#">Manage Students</a></li>
                    <li class="nav-item"><a href="#">Exam Schedules</a></li>
                    <li class="nav-item"><a href="#">Reports</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-3">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Overview</h2>
                <button class="btn btn-outline-dark d-md-none" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                    Menu
                </button>
            </div>

            <div class="row g-3">
                <div class="col-12 col-sm-6 col-lg-3">
                    <div class="card text-white bg-primary h-100">
                        <div class="card-body">
                            <h6 class="card-title">Total Students</h6>
                            <h3 class="mb-0">1,250</h3>
                        </div>
                    </div>
                </div>
                
                <div class="col-12 col-sm-6 col-lg-3">
                    <div class="card text-white bg-success h-100">
                        <div class="card-body">
                            <h6 class="card-title">Active Exams</h6>
                            <h3 class="mb-0">12</h3>
                        </div>
                    </div>
                </div>
                
                <div class="col-12 col-sm-6 col-lg-3">
                    <div class="card text-white bg-warning h-100">
                        <div class="card-body">
                            <h6 class="card-title">Attendance</h6>
                            <h3 class="mb-0">87%</h3>
                        </div>
                    </div>
                </div>
                
                <div class="col-12 col-sm-6 col-lg-3">
                    <div class="card text-white bg-danger h-100">
                        <div class="card-body">
                            <h6 class="card-title">Alerts</h6>
                            <h3 class="mb-0">5</h3>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
